version: "3.9"

services:
  # ── MySQL 8.0 ──
  mysql:
    image: mysql:8.0
    container_name: sda-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "123456"
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p123456"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Redis ──
  redis:
    image: redis:7-alpine
    container_name: sda-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (FastAPI) ──
  backend:
    build: ./backend
    container_name: sda-backend
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      BIZ_DB_HOST: mysql
      BIZ_DB_PORT: "3306"
      BIZ_DB_USER: root
      BIZ_DB_PASSWORD: "123456"
      BIZ_DB_NAME: ecommerce_demo
      APP_DB_HOST: mysql
      APP_DB_PORT: "3306"
      APP_DB_USER: root
      APP_DB_PASSWORD: "123456"
      APP_DB_NAME: smart_analyst
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_DB: "1"
      HOST: "0.0.0.0"
      PORT: "8001"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Wait for MySQL to be fully ready, then seed demo data
    command: >
      sh -c "
        sleep 15 &&
        python -X utf8 data/init_data.py || true &&
        python -X utf8 -m uvicorn app.main:app --host 0.0.0.0 --port 8001
      "

  # ── Frontend (Vue 3 + Nginx) ──
  frontend:
    build: ./frontend
    container_name: sda-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
  redis_data:
